<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento não concluído — Legalito</title>
<meta name="robots" content="noindex,nofollow">
<style>
:root{--bg:#0e0f12;--card:#1a1d23;--text:#e8eaee;--muted:#9aa1ad;
  --accent:#c8794d;--accent-2:#b66c44;--border:#2a2e36}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  display:flex;align-items:center;justify-content:center;padding:24px}
.card{max-width:520px;width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:40px 32px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.icon{width:72px;height:72px;margin:0 auto 24px;border-radius:50%;background:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:36px;color:#fff}
h1{margin:0 0 12px;font-size:28px;font-weight:600}
p{color:var(--muted);line-height:1.6;margin:0 0 16px}
.btn{display:inline-block;margin:8px 6px 0;padding:12px 28px;text-decoration:none;
  border-radius:8px;font-weight:500;transition:background .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-2)}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.footer{margin-top:32px;font-size:12px;color:var(--muted)}
.footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="icon">!</div>
  <h1>Pagamento não concluído</h1>
  <p>Seu pagamento não foi processado. Nenhuma cobrança foi feita no seu cartão.</p>
  <p>Você pode tentar novamente ou continuar usando a versão gratuita (5 consultas por dia).</p>
  <div>
    <a href="https://tuabogabot.io/pt/#planos" class="btn btn-primary">Voltar aos planos</a>
    <a href="https://tuabogabot.io/pt/" class="btn btn-secondary">Seguir grátis</a>
  </div>
  <div class="footer">Se o problema persistir, escreva-nos para <a href="mailto:soporte@tuabogabot.io">soporte@tuabogabot.io</a>.</div>
</div>
</body>
</html>
